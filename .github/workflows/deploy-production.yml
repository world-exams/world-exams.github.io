name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saberparatodos/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./saberparatodos
        run: npm ci

      - name: 🔍 Run Linter
        working-directory: ./saberparatodos
        run: npm run lint

      - name: 🏗️ Build Application
        working-directory: ./saberparatodos
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: saberparatodos/dist
          retention-days: 1

  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: saberparatodos/dist

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: saberparatodos
          directory: saberparatodos/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
